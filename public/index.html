<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal Bridge</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #0d0d0d;
      overflow: hidden;
    }
    #terminal {
      width: 100%; height: 100%;
      padding: 4px;
    }
    #status {
      position: fixed;
      bottom: 10px; right: 14px;
      font: 11px/1 monospace;
      color: #555;
      z-index: 10;
      pointer-events: none;
      user-select: none;
      transition: color 0.3s;
    }
    #status.on  { color: #4ade80; }
    #status.off { color: #f87171; }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <div id="status" class="off">disconnected</div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script>
    const statusEl = document.getElementById('status');

    const term = new Terminal({
      cursorBlink: true,
      cursorStyle: 'block',
      cursorWidth: 1,
      fontSize: 15,
      fontFamily: "'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, 'Lucida Console', 'Courier New', monospace",
      lineHeight: 1.15,
      letterSpacing: 0,
      scrollback: 5000,
      allowTransparency: false,
      theme: {
        background: '#0d0d0d',
        foreground: '#e8e8e8',
        cursor: '#e8e8e8',
        selectionBackground: '#3a3a5c',
        black: '#2e2e2e',
        red: '#eb4129',
        green: '#abe047',
        yellow: '#f6c744',
        blue: '#47a0f0',
        magenta: '#7a5dc7',
        cyan: '#64dbed',
        white: '#e5e5e5',
        brightBlack: '#5e5e5e',
        brightRed: '#fc6f5f',
        brightGreen: '#b3e86a',
        brightYellow: '#feda6a',
        brightBlue: '#68b4fa',
        brightMagenta: '#8d72c9',
        brightCyan: '#7ce4f0',
        brightWhite: '#f0f0f0',
      },
    });

    window.term = term;

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));

    let currentWs = null;

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${protocol}//${location.host}`);
      currentWs = ws;

      ws.onopen = () => {
        statusEl.textContent = 'connected';
        statusEl.className = 'on';
        term.focus();
        fitAddon.fit();
      };

      ws.onmessage = (event) => {
        term.write(event.data);
      };

      ws.onclose = () => {
        if (currentWs !== ws) return;
        statusEl.textContent = 'disconnected, retrying...';
        statusEl.className = 'off';
        currentWs = null;
        setTimeout(connect, 1500);
      };

      ws.onerror = () => ws.close();
    }

    let resizeTimer;
    term.onResize(({ cols, rows }) => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        if (currentWs && currentWs.readyState === WebSocket.OPEN) {
          currentWs.send(JSON.stringify({ type: 'resize', cols, rows }));
        }
      }, 150);
    });

    term.onData((data) => {
      if (currentWs && currentWs.readyState === WebSocket.OPEN) {
        currentWs.send(data);
      }
    });

    window.addEventListener('resize', () => fitAddon.fit());

    connect();
  </script>
</body>
</html>
